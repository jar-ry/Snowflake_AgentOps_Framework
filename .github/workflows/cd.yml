name: CD — Deploy to PROD on merge

on:
  push:
    branches: [main]
    paths:
      - 'semantic_views/**'
      - 'agents/**'
      - 'question_banks/**'
      - 'config/**'
      - 'evaluation/**'

permissions:
  id-token: write      # Required for OIDC (ignored when using password auth)
  contents: read

jobs:
  evaluate-and-deploy:
    name: "Evaluate → Gate → Deploy to PROD"
    runs-on: ubuntu-latest

    env:
      # All Snowflake connection details are parameterized via repo secrets.
      # Required: SNOWFLAKE_ACCOUNT, SNOWFLAKE_USER
      # Auth (one of): SNOWFLAKE_PASSWORD  OR  SNOWFLAKE_PRIVATE_KEY
      # Optional: SNOWFLAKE_ROLE, SNOWFLAKE_WAREHOUSE, SNOWFLAKE_DATABASE
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-actions@v2.0.4
        with:
          cli-version: "3.16"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure Snowflake connection
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/connections.toml << EOF
          [default]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          password = "${SNOWFLAKE_PASSWORD}"
          role = "${SNOWFLAKE_ROLE}"
          warehouse = "${SNOWFLAKE_WAREHOUSE}"
          database = "${SNOWFLAKE_DATABASE}"
          EOF
          chmod 600 ~/.snowflake/connections.toml

      - name: Verify Snowflake connection
        run: snow connection test

      # --- Quality Gate: Evaluate against DEV ---
      - name: Evaluate semantic view (quality gate)
        run: |
          python evaluation/evaluate_semantic_view.py \
            --environment dev \
            --categories easy,hard,ambiguous \
            --git-sha ${{ github.sha }} \
            --git-branch main \
            --output sv_eval_results.json

      - name: Check semantic view passed threshold
        run: |
          python -c "
          import json, sys
          with open('sv_eval_results.json') as f:
              r = json.load(f)
          s = r.get('summary', {})
          if not s.get('passed_threshold'):
              print(f'GATE FAILED: SV accuracy {s.get(\"accuracy_pct\")}% below threshold {s.get(\"threshold_pct\")}%')
              sys.exit(1)
          print(f'GATE PASSED: SV accuracy {s.get(\"accuracy_pct\")}% meets threshold {s.get(\"threshold_pct\")}%')
          "

      - name: Evaluate agent (quality gate)
        run: |
          python evaluation/audit_agent.py \
            --environment dev \
            --git-sha ${{ github.sha }} \
            --git-branch main \
            --timeout 600 \
            --output agent_eval_results.json

      - name: Check agent passed threshold
        run: |
          python -c "
          import json, sys
          with open('agent_eval_results.json') as f:
              r = json.load(f)
          if not r.get('passed_threshold'):
              avg = r.get('overall_average', 0)
              print(f'GATE FAILED: Agent avg {avg:.3f}')
              sys.exit(1)
          print(f'GATE PASSED: Agent avg {r.get(\"overall_average\", 0):.3f}')
          "

      # --- Deploy to PROD ---
      - name: Deploy semantic views to PROD
        run: python setup/deploy.py --target semantic_view --environment prod

      - name: Deploy agents to PROD
        run: python setup/deploy.py --target agent --environment prod

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cd-prod-deployment-results
          path: |
            sv_eval_results.json
            agent_eval_results.json
          if-no-files-found: ignore
