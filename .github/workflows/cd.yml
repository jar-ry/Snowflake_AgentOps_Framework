name: CD — Deploy to PROD on merge

on:
  push:
    branches: [main]
    paths:
      - 'semantic_views/**'
      - 'agents/**'
      - 'question_banks/**'
      - 'config/**'
      - 'evaluation/**'
      - '.github/workflows/cd.yml'

permissions:
  contents: read

# ─────────────────────────────────────────────────────────────
# Three-job pipeline: Evaluate → Gate → Deploy
# Each job is visible independently in the Actions UI.
# Deploy only runs if the quality gate passes.
# ─────────────────────────────────────────────────────────────

jobs:
  evaluate:
    name: "Evaluate against DEV"
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-actions@v2.0.4
        with:
          cli-version: "3.16"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure Snowflake connection
        run: |
          mkdir -p ~/.snowflake
          if [ -n "$SNOWFLAKE_PRIVATE_KEY" ]; then
            echo "$SNOWFLAKE_PRIVATE_KEY" > ~/.snowflake/ci_rsa_key.p8
            chmod 600 ~/.snowflake/ci_rsa_key.p8
            cat > ~/.snowflake/connections.toml << EOF
          [default]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          authenticator = "SNOWFLAKE_JWT"
          private_key_file = "/home/runner/.snowflake/ci_rsa_key.p8"
          role = "${SNOWFLAKE_ROLE}"
          warehouse = "${SNOWFLAKE_WAREHOUSE}"
          database = "${SNOWFLAKE_DATABASE}"
          EOF
          elif [ -n "$SNOWFLAKE_PASSWORD" ]; then
            cat > ~/.snowflake/connections.toml << EOF
          [default]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          password = "${SNOWFLAKE_PASSWORD}"
          role = "${SNOWFLAKE_ROLE}"
          warehouse = "${SNOWFLAKE_WAREHOUSE}"
          database = "${SNOWFLAKE_DATABASE}"
          EOF
          else
            echo "::error::No auth secret provided. Set SNOWFLAKE_PRIVATE_KEY or SNOWFLAKE_PASSWORD in repo secrets."
            exit 1
          fi
          chmod 600 ~/.snowflake/connections.toml

      - name: Verify Snowflake connection
        run: snow connection test

      - name: Evaluate semantic view
        run: |
          python evaluation/evaluate_semantic_view.py \
            --environment dev \
            --categories easy,hard,ambiguous \
            --git-sha "${{ github.sha }}" \
            --git-branch main \
            --output sv_eval_results.json

      - name: Evaluate agent
        run: |
          python evaluation/audit_agent.py \
            --environment dev \
            --git-sha "${{ github.sha }}" \
            --git-branch main \
            --timeout 600 \
            --output agent_eval_results.json

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            sv_eval_results.json
            agent_eval_results.json
          if-no-files-found: ignore

  gate:
    name: "Quality Gate"
    needs: evaluate
    runs-on: ubuntu-latest

    steps:
      - name: Download eval results
        uses: actions/download-artifact@v4
        with:
          name: eval-results

      - name: Check semantic view threshold
        run: |
          python3 -c "
          import json, sys
          with open('sv_eval_results.json') as f:
              r = json.load(f)
          s = r.get('summary', {})
          if not s.get('passed_threshold'):
              print(f'GATE FAILED: SV accuracy {s.get(\"accuracy_pct\")}% below threshold {s.get(\"threshold_pct\")}%')
              sys.exit(1)
          print(f'GATE PASSED: SV accuracy {s.get(\"accuracy_pct\")}% meets threshold {s.get(\"threshold_pct\")}%')
          "

      - name: Check agent threshold
        run: |
          python3 -c "
          import json, sys
          with open('agent_eval_results.json') as f:
              r = json.load(f)
          if not r.get('passed_threshold'):
              avg = r.get('overall_average', 0)
              print(f'GATE FAILED: Agent avg {avg:.3f}')
              sys.exit(1)
          print(f'GATE PASSED: Agent avg {r.get(\"overall_average\", 0):.3f}')
          "

  deploy:
    name: "Deploy to PROD"
    needs: gate
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-actions@v2.0.4
        with:
          cli-version: "3.16"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure Snowflake connection
        run: |
          mkdir -p ~/.snowflake
          if [ -n "$SNOWFLAKE_PRIVATE_KEY" ]; then
            echo "$SNOWFLAKE_PRIVATE_KEY" > ~/.snowflake/ci_rsa_key.p8
            chmod 600 ~/.snowflake/ci_rsa_key.p8
            cat > ~/.snowflake/connections.toml << EOF
          [default]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          authenticator = "SNOWFLAKE_JWT"
          private_key_file = "/home/runner/.snowflake/ci_rsa_key.p8"
          role = "${SNOWFLAKE_ROLE}"
          warehouse = "${SNOWFLAKE_WAREHOUSE}"
          database = "${SNOWFLAKE_DATABASE}"
          EOF
          elif [ -n "$SNOWFLAKE_PASSWORD" ]; then
            cat > ~/.snowflake/connections.toml << EOF
          [default]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          password = "${SNOWFLAKE_PASSWORD}"
          role = "${SNOWFLAKE_ROLE}"
          warehouse = "${SNOWFLAKE_WAREHOUSE}"
          database = "${SNOWFLAKE_DATABASE}"
          EOF
          else
            echo "::error::No auth secret provided. Set SNOWFLAKE_PRIVATE_KEY or SNOWFLAKE_PASSWORD in repo secrets."
            exit 1
          fi
          chmod 600 ~/.snowflake/connections.toml

      - name: Deploy semantic views to PROD
        run: python setup/deploy.py --target semantic_view --environment prod --dry-run

      - name: Deploy agents to PROD
        run: python setup/deploy.py --target agent --environment prod --dry-run
