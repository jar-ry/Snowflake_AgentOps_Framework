name: CI — Evaluate on PR / Branch Push

on:
  pull_request:
    branches: [main]
    paths:
      - 'semantic_views/**'
      - 'agents/**'
      - 'question_banks/**'
      - 'config/**'
      - 'evaluation/**'
  push:
    branches-ignore: [main]
    paths:
      - 'semantic_views/**'
      - 'agents/**'
      - 'question_banks/**'
      - 'config/**'
      - 'evaluation/**'

permissions:
  id-token: write      # Required for OIDC (ignored when using password auth)
  contents: read
  pull-requests: write

jobs:
  evaluate:
    name: "Evaluate against DEV"
    runs-on: ubuntu-latest

    env:
      # All Snowflake connection details are parameterized via repo secrets.
      # Required: SNOWFLAKE_ACCOUNT, SNOWFLAKE_USER
      # Auth (one of): SNOWFLAKE_PRIVATE_KEY (key-pair, recommended)
      #            OR  SNOWFLAKE_PASSWORD (password fallback)
      # Optional: SNOWFLAKE_ROLE, SNOWFLAKE_WAREHOUSE, SNOWFLAKE_DATABASE
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-actions@v2.0.4
        with:
          cli-version: "3.16"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure Snowflake connection
        run: |
          mkdir -p ~/.snowflake
          # Write private key if provided (key-pair auth takes priority)
          if [ -n "$SNOWFLAKE_PRIVATE_KEY" ]; then
            echo "$SNOWFLAKE_PRIVATE_KEY" > ~/.snowflake/ci_rsa_key.p8
            chmod 600 ~/.snowflake/ci_rsa_key.p8
            cat > ~/.snowflake/connections.toml << EOF
          [default]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          authenticator = "SNOWFLAKE_JWT"
          private_key_file = "~/.snowflake/ci_rsa_key.p8"
          role = "${SNOWFLAKE_ROLE}"
          warehouse = "${SNOWFLAKE_WAREHOUSE}"
          database = "${SNOWFLAKE_DATABASE}"
          EOF
          else
            cat > ~/.snowflake/connections.toml << EOF
          [default]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          password = "${SNOWFLAKE_PASSWORD}"
          role = "${SNOWFLAKE_ROLE}"
          warehouse = "${SNOWFLAKE_WAREHOUSE}"
          database = "${SNOWFLAKE_DATABASE}"
          EOF
          fi
          chmod 600 ~/.snowflake/connections.toml

      - name: Verify Snowflake connection
        run: snow connection test

      - name: Run semantic view evaluation
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          python evaluation/evaluate_semantic_view.py \
            --environment dev \
            --categories easy,hard,ambiguous \
            --git-sha "${{ github.sha }}" \
            --git-branch "$BRANCH" \
            --output sv_eval_results.json || true

      - name: Run agent evaluation
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          python evaluation/audit_agent.py \
            --environment dev \
            --git-sha "${{ github.sha }}" \
            --git-branch "$BRANCH" \
            --timeout 600 \
            --output agent_eval_results.json || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-eval-results
          path: |
            sv_eval_results.json
            agent_eval_results.json
          if-no-files-found: ignore

      - name: Comment PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let svResults = {};
            let agentResults = {};
            try { svResults = JSON.parse(fs.readFileSync('sv_eval_results.json', 'utf8')); } catch (e) {}
            try { agentResults = JSON.parse(fs.readFileSync('agent_eval_results.json', 'utf8')); } catch (e) {}

            const svStatus = svResults?.summary?.passed_threshold ? '✅ PASSED' : '❌ FAILED';
            const agentStatus = agentResults?.passed_threshold ? '✅ PASSED' : '⚠️ ' + (agentResults?.status || 'NOT_RUN');

            const svAcc = svResults?.summary?.accuracy_pct || 'N/A';
            const agentAvg = agentResults?.overall_average ? agentResults.overall_average.toFixed(3) : 'N/A';

            const body = [
              '## CI Evaluation Results',
              '',
              `### Semantic View ${svStatus}`,
              `Accuracy: **${svAcc}%** (threshold: ${svResults?.summary?.threshold_pct || 'N/A'}%)`,
              '',
              `### Agent ${agentStatus}`,
              `Overall average: **${agentAvg}**`,
              '',
              `> Commit: \`${context.sha.slice(0,7)}\` | Branch: \`${{ github.head_ref || github.ref_name }}\``,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
