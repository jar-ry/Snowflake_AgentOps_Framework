questions:
  - id: agent_001
    question: "What is the total balance across all savings accounts?"
    should_answer: true
    expected_answer_contains: ["balance", "savings"]
    category: data_query
    description: "Aggregation over accounts filtered by account type"
  - id: agent_002
    question: "How many active customers do we have?"
    should_answer: true
    expected_answer_contains: ["active", "customers"]
    category: data_query
    description: "Filtered count of customers"
  - id: agent_003
    question: "What is the total portfolio value by customer segment?"
    should_answer: true
    expected_answer_contains: ["portfolio", "segment"]
    category: data_query
    description: "Join portfolios to customers, group by segment"
  - id: agent_004
    question: "Which customers have the highest total account balances?"
    should_answer: true
    expected_answer_contains: ["balance", "customer"]
    category: data_query
    description: "Ranked aggregation of balances per customer"
  - id: agent_005
    question: "What is the average risk score for high-risk assessments?"
    should_answer: true
    expected_answer_contains: ["risk", "score"]
    category: data_query
    description: "Average over risk assessments filtered by risk level"
